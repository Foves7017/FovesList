<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项象限图 — FovesList</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>待办事项象限图</h1>
            <div class="header-actions">
                <a href="/events/trash" class="btn-trash" title="回收站">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                    </svg>
                </a>
                <span id="statusIndicator" class="status-dot" title="连接状态"></span>
                <button id="refreshBtn" class="btn-refresh" title="刷新数据">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="main-area" id="mainArea">
            <div class="chart-wrapper" id="chartWrapper">
                <canvas id="quadrantChart"></canvas>
            </div>
            <aside id="detailPanel" class="detail-panel">
                <div class="dp-header">
                    <h3 id="dpTitle" class="dp-editable" title="点击编辑标题"></h3>
                    <button id="dpClose" class="dp-close" title="关闭">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="dp-body">
                    <div class="dp-field">
                        <span class="dp-label">重要程度</span>
                        <span class="dp-value" id="dpImportence"></span>
                    </div>
                    <div class="dp-field">
                        <span class="dp-label">紧急程度</span>
                        <span class="dp-value" id="dpUrgency"></span>
                    </div>
                    <div class="dp-field">
                        <span class="dp-label">象限</span>
                        <span class="dp-value" id="dpQuadrant"></span>
                    </div>
                    <div class="dp-field dp-desc dp-editable" id="dpDescription" title="点击编辑描述">
                    </div>
                    <div class="dp-divider"></div>
                    <div class="dp-sub-header">子任务</div>
                    <ul id="dpSubEvents" class="dp-sub-list"></ul>
                    <button id="dpAddSub" class="dp-add-sub">+ 添加子任务</button>
                </div>
            </aside>
        </div>

        <footer>
            <span id="eventCount">尚未加载数据</span>
        </footer>
    </div>

    <script src="index.js"></script>
</body>
</html>
